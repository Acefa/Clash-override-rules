name: Build Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyinstaller requests pyyaml

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name ClashConverter clash_converter_gui.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClashConverter-Windows
        path: dist/ClashConverter.exe
