# DNS 最佳配置 - 平衡安全性和速度
dns:
  enable: true
  listen: 127.0.0.1:1053  # 安全：仅本地监听
  ipv6: false  # 安全：防止IPv6泄漏
  respect-rules: true  # 安全：DNS查询遵守代理规则，防止泄漏
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-filter-mode: blacklist

  # 速度优化：fake-ip-filter最小化（仅保留必需的兼容性域名）
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "ntp.*.com"
    # 仅保留关键银行/支付域名（兼容性）
    - "+.icbc.com.cn"
    - "+.ccb.com.cn"
    - "+.boc.cn"
    - "+.abchina.com"
    - "+.alipay.com"

  # 速度优化：default-nameserver使用最快的国内DNS（UDP）
  default-nameserver:
    - 223.5.5.5  # 阿里DNS（最快）
    - 119.29.29.29  # 腾讯DNS

  # 安全优化：proxy-server-nameserver使用DoH（代理服务器域名解析）
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query

  # 速度优化：nameserver混合UDP和DoH
  nameserver:
    - 223.5.5.5  # UDP，速度最快
    - 119.29.29.29  # UDP备用
    - https://doh.pub/dns-query  # DoH备用

  # 可靠性：fallback使用国际DNS（仅在国内DNS返回污染结果时使用）
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  # 安全：fallback-filter确保国内域名不使用国际DNS
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
