# Clash Party 覆写规则 - Smart 智能版
# 网络安全 + 性能优化 + 稳定性增强 + Smart 智能节点选择

# 全局配置优化
mixed-port: 7890  # 混合端口，同时支持 HTTP(S) 和 SOCKS5 协议
allow-lan: false  # 禁止局域网连接，仅本机可用，提高安全性
bind-address: "127.0.0.1"  # 绑定到本地回环地址，只允许本机访问
mode: rule  # 运行模式：rule(规则模式) / global(全局代理) / direct(全局直连)
ipv6: false  # 统一关闭 IPv6，避免 DNS 泄漏
unified-delay: true  # 统一延迟测试，更准确的节点延迟
tcp-concurrent: true  # TCP 并发连接，提升多连接场景性能
log-level: info  # 日志级别：silent/error/warning/info/debug
find-process-mode: strict  # 进程匹配模式：strict(严格) / off(关闭)
global-ua: clash.meta  # 全局 User-Agent 标识
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false

# Smart 内核配置 - 智能节点选择核心功能
smart-core:
  uselightgbm: true
  lgbm-auto-update: false
  collectdata: true
  sample-rate: 1
  smart-collector-size: 100

profile:
  store-selected: true  # 存储选择的节点，重启后自动选择上次使用的节点
  store-fake-ip: true  # 持久化 fake-ip 映射表

experimental:
  sniff-tls-sni: true  # 嗅探 TLS SNI 域名

# 嗅探配置（Windows 端优化）
sniffer:
  enable: true
  parse-pure-ip: false
  force-dns-mapping: false
  override-destination: true
  sniff:  # 嗅探协议配置
    HTTP:
      ports: [80, 8080-8090]  # HTTP 嗅探端口范围
      override-destination: false
    TLS:
      ports: [443, 8443]  # HTTPS/TLS 嗅探端口
    QUIC:
      ports: [443, 8443]  # QUIC 协议嗅探端口
  force-domain:  # 强制对这些域名进行嗅探
    - "+.v2ex.com"
    - "+.github.io"
    - "+.cloudflare.com"
  skip-domain:  # 跳过嗅探的域名（直接使用原始请求）
    # Windows 系统服务
    - "+.microsoft.com"
    - "+.windows.com"
    - "+.windowsupdate.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    # Apple 服务
    - "+.push.apple.com"
    - "+.apple.com"
    # 金融安全
    - "+.alipay.com"
    - "+.alipayobjects.com"
    - "+.wechat.com"
    - "+.weixin.qq.com"
    - "+.icbc.com.cn"
    - "+.ccb.com.cn"
    - "+.boc.cn"
    - "+.abchina.com"


  skip-dst-address:  # 跳过嗅探的目标 IP 地址段（Telegram IP 段）
    - 91.105.192.0/23
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 95.161.64.0/20
    - 149.154.160.0/20
    - 185.76.151.0/24
    - 2001:67c:4e8::/48
    - 2001:b28:f23c::/47
    - 2001:b28:f23f::/48
    - 2a0a:f280:203::/48

# TUN 配置（兼容性优化）
tun:
  enable: true  # 启用 TUN 模式，接管系统流量
  stack: system  # 协议栈模式：system/gvisor/mixed，mixed 兼容性最好
  device: Mihomo  # 虚拟网卡名称
  mtu: 1500  # 最大传输单元
  dns-hijack:  # DNS 劫持配置
    - "any:53"  # 劫持所有 53 端口的 DNS 请求
  auto-route: true  # 自动配置路由表
  auto-redirect: true  # 自动配置 iptables/nftables 重定向
  auto-detect-interface: true  # 自动检测出站网卡
  strict-route: true  # 严格路由模式，确保所有流量都经过 TUN
  route-exclude-address:  # 排除的路由地址段（不走代理）
    - 192.168.0.0/16  # C 类私有地址
    - 10.0.0.0/8  # A 类私有地址
    - 172.16.0.0/12  # B 类私有地址
    - 127.0.0.0/8  # 本地回环地址

# DNS 优化配置（防泄漏）
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false  # 启用 IPv6 DNS 劫持
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-filter-mode: blacklist
  cache-algorithm: arc
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.microsoft.com"
    - "+.windows.com"
    - "+.windowsupdate.com"
    - "time.*.com"
    - "ntp.*.com"
    - "+.icbc.com.cn"
    - "+.ccb.com.cn"
    - "+.boc.cn"
    - "+.abchina.com"
    - "+.alipay.com"
    - "+.wechat.com"
    - "+.weixin.qq.com"
    - "+.qq.com"
    - "+.tencent.com"
    - "+.baidu.com"
    - "+.taobao.com"
    - "+.jd.com"
    - "+.cn"
    - "+.com.cn"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    # 火山引擎专用（改用阿里 DNS，更快更稳定）
    '+.volcengine.com': [223.5.5.5, 223.6.6.6]
    '+.volces.com': [223.5.5.5, 223.6.6.6]
    '+.bytedance.com': [223.5.5.5, 223.6.6.6]
    # 其他 AI 服务
    '+.deepseek.com': [223.5.5.5, 119.29.29.29]
    '+.aliyuncs.com': [223.5.5.5, 223.6.6.6]
    '+.aliyun.com': [223.5.5.5, 223.6.6.6]
    '+.openrouter.ai': [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]
    # 国外服务
    '+.youtube.com': [8.8.8.8, 8.8.4.4]
    '+.googlevideo.com': [8.8.8.8, 8.8.4.4]
    '+.google.com': [8.8.8.8, 8.8.4.4]
    '+.gstatic.com': [8.8.8.8, 8.8.4.4]
    'geosite:geolocation-!cn': [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]
    'geosite:gfw': [https://1.1.1.1/dns-query, https://8.8.8.8/dns-query]
    '+.rjj.cc': [223.5.5.5, 119.29.29.29]
    'geosite:cn': [223.5.5.5, 119.29.29.29]
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

