# 规则配置（优化顺序：高频服务优先）
rules:
  # 1. 局域网（最高优先级）- 本地网络直连
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve  # C 类私有地址，no-resolve 表示不解析域名
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve  # A 类私有地址
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve  # B 类私有地址
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve  # 本地回环地址
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve  # 运营商级 NAT
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve  # 组播地址
  - IP-CIDR,240.0.0.0/4,DIRECT,no-resolve  # 保留地址
  - IP-CIDR6,::1/128,DIRECT,no-resolve  # IPv6 回环地址
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve  # IPv6 唯一本地地址
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve  # IPv6 链路本地地址
  - IP-CIDR6,fd00::/8,DIRECT,no-resolve  # IPv6 私有地址

  # 2. 广告拦截（减少无效请求）
  - RULE-SET,BanAD,广告拦截  # RULE-SET 表示使用规则集
  - RULE-SET,BanProgramAD,应用净化

  # 3. 基础规则
  - RULE-SET,private_domain,全球直连
  - RULE-SET,LocalAreaNetwork,全球直连
  - RULE-SET,UnBan,全球直连

  # 4. 火山引擎优化（流式语音识别）- 必须在 GEOSITE,cn 之前
  - DOMAIN-SUFFIX,volcengine.com,DIRECT
  - DOMAIN-SUFFIX,volces.com,DIRECT
  - DOMAIN-SUFFIX,bytedance.com,DIRECT
  - DOMAIN-SUFFIX,deepseek.com,DIRECT
  - DOMAIN-SUFFIX,aliyuncs.com,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,rjj.cc,DIRECT
  - DOMAIN-SUFFIX,newcli.com,DIRECT
  - DOMAIN-SUFFIX,openrouter.ai,DIRECT

  # 5. 高频国外服务（YouTube、Twitter、Telegram、GitHub）
  - RULE-SET,YouTube,油管视频
  - RULE-SET,Twitter,X平台
  - RULE-SET,Telegram,电报消息
  - RULE-SET,GitHub,节点选择

  # 4. 高频国内服务（微信、抖音、小红书、B站等）
  - GEOSITE,cn,全球直连  # geosite:cn 覆盖所有国内域名，提前命中加速直连
  - RULE-SET,BilibiliHMT,哔哩哔哩
  - RULE-SET,Bilibili,哔哩哔哩
  - RULE-SET,ChinaMedia,国内媒体
  - RULE-SET,SteamCN,全球直连


  # 6. AI 服务
  - RULE-SET,AI-MIX,AI-UNHK
  - RULE-SET,OpenAi,OpenAi

  # 7. 常用服务
  - RULE-SET,Microsoft,微软服务
  - RULE-SET,Apple,苹果服务
  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,Bahamut,巴哈姆特

  # 8. 低频服务
  - RULE-SET,GoogleFCM,谷歌FCM
  - RULE-SET,NetEaseMusic,网易音乐
  - RULE-SET,Epic,游戏平台
  - RULE-SET,Origin,游戏平台
  - RULE-SET,Sony,游戏平台
  - RULE-SET,Steam,游戏平台
  - RULE-SET,Nintendo,游戏平台
  - RULE-SET,ProxyMedia,国外媒体
  - RULE-SET,ProxyGFWlist,节点选择
  - RULE-SET,ChinaCompanyIp,全球直连,no-resolve
  - RULE-SET,Download,全球直连

  # 9. 兜底规则
  - GEOIP,CN,全球直连,no-resolve  # GEOIP 匹配中国 IP
  - MATCH,漏网之鱼  # MATCH 匹配所有未匹配的流量

# GEO 数据自动更新
geo-auto-update: true  # 启用 GEO 数据自动更新
geo-update-interval: 48  # 更新间隔（小时）
geodata-mode: true  # 使用 GEO 数据模式
geox-url:  # GEO 数据下载地址
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
