# 规则配置（优化顺序：减少匹配次数）
rules:
  
  # 4. 火山引擎优化（流式语音识别）- 必须在 GEOSITE,cn 之前
  - DOMAIN-SUFFIX,volcengine.com,DIRECT
  - DOMAIN-SUFFIX,volces.com,DIRECT
  - DOMAIN-SUFFIX,bytedance.com,DIRECT
  - DOMAIN-SUFFIX,deepseek.com,DIRECT
  - DOMAIN-SUFFIX,aliyuncs.com,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,rjj.cc,DIRECT
  - DOMAIN-SUFFIX,newcli.com,DIRECT
  - DOMAIN-SUFFIX,openrouter.ai,DIRECT
  
  # 1. 局域网直连（最高优先级）
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR,240.0.0.0/4,DIRECT,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  - IP-CIDR6,fd00::/8,DIRECT,no-resolve

  # 2. 广告拦截
  - RULE-SET,BanAD,广告拦截
  - RULE-SET,BanProgramAD,应用净化

  # 3. 基础规则
  - RULE-SET,private_domain,全球直连
  - RULE-SET,LocalAreaNetwork,全球直连
  - RULE-SET,UnBan,全球直连

  # 4. 国内流量直连（提前到高优先级，减少后续匹配）
  - RULE-SET,ChinaDomain,全球直连

  # 5. 国外高频服务
  - DOMAIN-SUFFIX,services.googleapis.cn,节点选择
  - RULE-SET,GoogleCNProxyIP,节点选择
  - RULE-SET,YouTube,油管视频
  - RULE-SET,Twitter,X平台
  - RULE-SET,Telegram,电报消息
  - RULE-SET,GitHub,节点选择

  # 6. 国内媒体
  - RULE-SET,ChinaMedia,全球直连

  # 7. AI 服务
  - RULE-SET,AI-MIX,AI-UNHK
  - RULE-SET,OpenAi,OpenAi

  # 8. 常用服务
  - RULE-SET,Microsoft,微软服务
  - RULE-SET,Apple,苹果服务
  - RULE-SET,Netflix,奈飞视频
  - RULE-SET,Bahamut,巴哈姆特

  # 9. 低频服务
  - RULE-SET,GoogleFCM,谷歌FCM
  - RULE-SET,ProxyMedia,国外媒体
  - RULE-SET,ProxyGFWlist,节点选择
  - RULE-SET,ChinaIp,全球直连
  - RULE-SET,ChinaCompanyIp,全球直连,no-resolve
  - RULE-SET,Download,全球直连

  # 10. 兜底规则
  - GEOSITE,cn,全球直连
  - GEOIP,CN,全球直连,no-resolve
  - MATCH,漏网之鱼

# GEO 数据自动更新
geo-auto-update: true
geo-update-interval: 48
geodata-mode: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
