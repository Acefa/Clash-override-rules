      - DIRECT

  - name: 手动切换
    include-all: true
    type: select

  - name: 自动选择
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    expected-status: 204

  - name: 负载均衡
