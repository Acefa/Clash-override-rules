<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash 订阅转换工具</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            margin: 0 auto;
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        label { display: block; color: #555; margin-bottom: 8px; font-weight: 500; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea { resize: vertical; font-family: monospace; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .download-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        .download-btn { background: #10b981; margin-top: 10px; }
        .github-link { text-align: center; margin-top: 20px; }
        .github-link a { color: #667eea; text-decoration: none; font-size: 14px; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .status.success { background: #d1fae5; color: #065f46; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Clash 订阅转换</h1>
        <p class="subtitle">在线转换订阅链接为 Clash 配置，支持手动添加节点</p>

        <form id="convertForm">
            <label>订阅链接（可选）</label>
            <input type="url" id="subUrl" placeholder="https://...">

            <label>手动添加节点（可选）</label>
            <textarea id="manualNodes" rows="6" placeholder="每行一个节点 URL，支持 ss:// ssr:// vmess:// vless:// trojan:// hysteria:// tuic:// anytls://"></textarea>

            <label>选择模板</label>
            <select id="template">
                <option value="override-rules-optimized.yaml">override-rules-optimized.yaml - 优化版</option>
                <option value="override-rules-smart.yaml">override-rules-smart.yaml - 智能版</option>
                <option value="clash-meta-android-template.yaml">clash-meta-android-template.yaml - 安卓版</option>
                <option value="clash-meta-template.yaml">clash-meta-template.yaml - 标准版</option>
            </select>

            <button type="submit">开始转换</button>
        </form>

        <div id="status" class="status"></div>

        <div id="logArea" style="display:none; margin-top:20px; padding:15px; background:#f5f5f5; border-radius:6px; max-height:200px; overflow-y:auto; font-size:13px; font-family:monospace;"></div>

        <div class="download-section">
            <h3>📥 下载桌面工具</h3>
            <p style="color: #666; font-size: 14px; margin: 10px 0;">支持离线使用，功能更强大</p>
            <a href="https://github.com/Acefa/Clash-override-rules/releases/latest" target="_blank">
                <button class="download-btn">下载 Windows 版本</button>
            </a>
        </div>

        <div class="github-link">
            <a href="https://github.com/Acefa/Clash-override-rules" target="_blank">⭐ GitHub 仓库</a>
        </div>
    </div>

    <script>
        // 协议解析函数
        function parseSS(url) {
            try {
                if (!url.startsWith('ss://')) return null;
                url = url.slice(5);
                let name = 'SS Node';
                if (url.includes('#')) {
                    [url, name] = url.split('#');
                    name = decodeURIComponent(name);
                }
                if (!url.includes('@')) return null;
                const [methodPassword, serverPort] = url.split('@');
                let method, password;
                try {
                    const decoded = atob(methodPassword);
                    [method, password] = decoded.split(':', 2);
                } catch {
                    return null;
                }
                const [server, port] = serverPort.split(':');
                return { name, type: 'ss', server, port: parseInt(port), cipher: method, password, udp: true };
            } catch { return null; }
        }

        function parseVMess(url) {
            try {
                if (!url.startsWith('vmess://')) return null;
                const config = JSON.parse(atob(url.slice(8)));
                const node = {
                    name: config.ps || 'VMess Node',
                    type: 'vmess',
                    server: config.add,
                    port: parseInt(config.port),
                    uuid: config.id,
                    alterId: parseInt(config.aid || 0),
                    cipher: config.scy || 'auto',
                    udp: true,
                    network: config.net || 'tcp'
                };
                if (config.tls === 'tls') {
                    node.tls = true;
                    node.servername = config.sni || config.host || '';
                    node['skip-cert-verify'] = true;
                }
                if (node.network === 'ws') {
                    node['ws-opts'] = { path: config.path || '/' };
                    if (config.host) node['ws-opts'].headers = { Host: config.host };
                }
                return node;
            } catch { return null; }
        }

        function parseVLESS(url) {
            try {
                if (!url.startsWith('vless://')) return null;
                url = url.slice(8);
                let name = 'VLESS Node';
                if (url.includes('#')) {
                    [url, name] = url.split('#');
                    name = decodeURIComponent(name);
                }
                const params = new URLSearchParams(url.includes('?') ? url.split('?')[1] : '');
                url = url.split('?')[0];
                const [uuid, serverPort] = url.split('@');
                const [server, port] = serverPort.split(':');
                const node = {
                    name, type: 'vless', server, port: parseInt(port), uuid,
                    network: params.get('type') || 'tcp', udp: true
                };
                const security = params.get('security');
                if (security === 'reality') {
                    node.tls = true;
                    node.servername = params.get('sni') || '';
                    node['reality-opts'] = {
                        'public-key': params.get('pbk') || '',
                        'short-id': params.get('sid') || ''
                    };
                    if (params.get('fp')) node['client-fingerprint'] = params.get('fp');
                } else if (security === 'tls') {
                    node.tls = true;
                    if (params.get('sni')) node.servername = params.get('sni');
                }
                if (node.network === 'ws') {
                    node['ws-opts'] = { path: params.get('path') || '/' };
                    if (params.get('host')) node['ws-opts'].headers = { Host: params.get('host') };
                }
                node['skip-cert-verify'] = params.get('insecure') === '1';
                return node;
            } catch { return null; }
        }

        function parseSSR(url) {
            try {
                if (!url.startsWith('ssr://')) return null;
                const decoded = atob(url.slice(6));
                const [main, paramsStr] = decoded.split('/?');
                const [server, port, protocol, method, obfs, passwordB64] = main.split(':');
                const password = atob(passwordB64);
                const params = new URLSearchParams(paramsStr || '');
                const name = params.get('remarks') ? decodeURIComponent(atob(params.get('remarks'))) : 'SSR Node';
                return { name, type: 'ssr', server, port: parseInt(port), cipher: method, password, protocol, obfs };
            } catch { return null; }
        }

        function parseAnyTLS(url) {
            try {
                if (!url.startsWith('anytls://')) return null;
                url = url.slice(9);
                let name = 'AnyTLS Node';
                if (url.includes('#')) {
                    [url, name] = url.split('#');
                    name = decodeURIComponent(name);
                }
                const params = new URLSearchParams(url.includes('?') ? url.split('?')[1] : '');
                url = url.split('?')[0];
                const [password, serverPort] = url.split('@');
                const [server, port] = serverPort.split(':');
                const node = { name, type: 'anytls', server, port: parseInt(port), password, udp: true, tfo: true };
                const security = params.get('security');
                if (security === 'reality') {
                    node.sni = params.get('sni') || '';
                    node['reality-opts'] = { 'public-key': params.get('pbk') || '', 'short-id': params.get('sid') || '' };
                    if (params.get('fp')) node['client-fingerprint'] = params.get('fp');
                }
                node['skip-cert-verify'] = params.get('insecure') === '1';
                return node;
            } catch { return null; }
        }

        function parseTrojan(url) {
            try {
                if (!url.startsWith('trojan://')) return null;
                url = url.slice(9);
                let name = 'Trojan Node';
                if (url.includes('#')) {
                    [url, name] = url.split('#');
                    name = decodeURIComponent(name);
                }
                const params = new URLSearchParams(url.includes('?') ? url.split('?')[1] : '');
                url = url.split('?')[0];
                const [password, serverPort] = url.split('@');
                const [server, port] = serverPort.split(':');
                return {
                    name, type: 'trojan', server, port: parseInt(port), password,
                    'skip-cert-verify': true, sni: params.get('sni') || ''
                };
            } catch { return null; }
        }

        function parseHysteria(url) {
            try {
                let version = 1, name;
                if (url.startsWith('hysteria://')) {
                    url = url.slice(11);
                } else if (url.startsWith('hysteria2://')) {
                    url = url.slice(12);
                    version = 2;
                } else return null;
                
                name = version === 2 ? 'Hysteria2 Node' : 'Hysteria Node';
                if (url.includes('#')) {
                    [url, name] = url.split('#');
                    name = decodeURIComponent(name);
                }
                const params = new URLSearchParams(url.includes('?') ? url.split('?')[1] : '');
                url = url.split('?')[0];
                
                let password, serverPort;
                if (url.includes('@')) {
                    [password, serverPort] = url.split('@');
                } else {
                    serverPort = url;
                    password = params.get('password') || params.get('auth') || '';
                }
                const [server, port] = serverPort.split(':');
                const node = {
                    name, type: version === 2 ? 'hysteria2' : 'hysteria',
                    server, port: parseInt(port), password,
                    'skip-cert-verify': params.get('insecure') === '1'
                };
                if (params.get('sni')) node.sni = params.get('sni');
                if (params.get('alpn')) node.alpn = [params.get('alpn')];
                if (version === 2 && params.get('obfs')) node.obfs = params.get('obfs');
                return node;
            } catch { return null; }
        }

        function parseTUIC(url) {
            try {
                if (!url.startsWith('tuic://')) return null;
                url = decodeURIComponent(url.slice(7));
                let name = 'TUIC Node';
                if (url.includes('#')) {
                    [url, name] = url.split('#');
                    name = decodeURIComponent(name);
                }
                const params = new URLSearchParams(url.includes('?') ? url.split('?')[1] : '');
                url = url.split('?')[0];
                const [uuidPassword, serverPort] = url.split('@');
                const [uuid, password] = uuidPassword.split(':');
                const [server, port] = serverPort.split(':');
                return {
                    name, type: 'tuic', server, port: parseInt(port), uuid, password,
                    'congestion-control': params.get('congestion_control') || 'bbr',
                    'udp-relay-mode': 'native',
                    'skip-cert-verify': params.get('insecure') === '1',
                    alpn: params.get('alpn') ? params.get('alpn').split(',') : ['h3']
                };
            } catch { return null; }
        }

        function parseNode(url) {
            if (url.startsWith('ss://')) return parseSS(url);
            if (url.startsWith('ssr://')) return parseSSR(url);
            if (url.startsWith('vmess://')) return parseVMess(url);
            if (url.startsWith('vless://')) return parseVLESS(url);
            if (url.startsWith('trojan://')) return parseTrojan(url);
            if (url.startsWith('hysteria://') || url.startsWith('hysteria2://')) return parseHysteria(url);
            if (url.startsWith('tuic://')) return parseTUIC(url);
            if (url.startsWith('anytls://')) return parseAnyTLS(url);
            return null;
        }

        async function fetchSubscription(url) {
            const response = await fetch(url);
            const text = await response.text();
            const decoded = atob(text);
            const lines = decoded.split('\n').filter(l => l.trim());
            return lines.map(parseNode).filter(n => n);
        }

        function parseManualNodes(text) {
            const lines = text.split('\n').filter(l => l.trim());
            return lines.map(parseNode).filter(n => n);
        }

        async function loadTemplate(filename) {
            const url = `https://raw.githubusercontent.com/Acefa/Clash-override-rules/main/${filename}`;
            const response = await fetch(url);
            const text = await response.text();
            return jsyaml.load(text);
        }

        function generateConfig(nodes, template) {
            delete template['proxy-providers'];
            const validNodes = nodes.filter(n => 
                n.server !== '1.1.1.1' && 
                n.password !== 'fake_node_password' && 
                !n.name.includes('❗')
            );
            template.proxies = validNodes;
            return template;
        }

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'status error' : 'status success';
        }

        function log(message) {
            const logArea = document.getElementById('logArea');
            logArea.style.display = 'block';
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `<div>[${time}] ${message}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearLog() {
            const logArea = document.getElementById('logArea');
            logArea.innerHTML = '';
            logArea.style.display = 'none';
        }

        document.getElementById('convertForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const subUrl = document.getElementById('subUrl').value.trim();
            const manualText = document.getElementById('manualNodes').value.trim();
            const template = document.getElementById('template').value;

            if (!subUrl && !manualText) {
                showStatus('❌ 请至少填写订阅链接或手动节点', true);
                return;
            }

            btn.textContent = '转换中...';
            btn.disabled = true;
            clearLog();

            try {
                let allNodes = [];
                let subCount = 0, manualCount = 0;

                if (subUrl) {
                    log('正在获取订阅...');
                    try {
                        const subNodes = await fetchSubscription(subUrl);
                        subCount = subNodes.length;
                        allNodes.push(...subNodes);
                        log(`✓ 订阅解析成功: ${subCount} 个节点`);
                    } catch (err) {
                        log('⚠️ 订阅获取失败: ' + err.message);
                        showStatus('⚠️ 订阅获取失败，可能存在跨域限制。建议下载桌面工具使用', true);
                        btn.textContent = '开始转换';
                        btn.disabled = false;
                        return;
                    }
                }

                if (manualText) {
                    log('正在解析手动节点...');
                    const manualNodes = parseManualNodes(manualText);
                    manualCount = manualNodes.length;
                    allNodes.push(...manualNodes);
                    log(`✓ 手动节点解析成功: ${manualCount} 个节点`);
                }

                if (allNodes.length === 0) {
                    log('❌ 未解析到有效节点');
                    showStatus('❌ 未解析到有效节点', true);
                    btn.textContent = '开始转换';
                    btn.disabled = false;
                    return;
                }

                log(`总节点数: ${allNodes.length}`);
                log('正在加载模板...');
                const templateConfig = await loadTemplate(template);
                log('✓ 模板加载成功');

                log('正在生成配置...');
                const config = generateConfig(allNodes, templateConfig);
                const validCount = config.proxies.length;
                const filteredCount = allNodes.length - validCount;
                if (filteredCount > 0) {
                    log(`⚠️ 过滤假节点: ${filteredCount} 个`);
                }
                log(`✓ 有效节点: ${validCount} 个`);

                log('正在下载配置文件...');
                const yaml = jsyaml.dump(config, { lineWidth: -1 });
                const blob = new Blob([yaml], { type: 'text/yaml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'clash-config.yaml';
                a.click();

                log('✓ 转换完成！');
                showStatus(`✅ 转换成功！订阅: ${subCount} | 手动: ${manualCount} | 有效: ${validCount}`);
            } catch (err) {
                log('❌ 错误: ' + err.message);
                showStatus('❌ 转换失败: ' + err.message, true);
            } finally {
                btn.textContent = '开始转换';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
