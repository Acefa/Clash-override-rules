<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash 订阅转换工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .download-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        .download-btn { background: #10b981; margin-top: 10px; }
        .github-link {
            text-align: center;
            margin-top: 20px;
        }
        .github-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Clash 订阅转换</h1>
        <p class="subtitle">在线转换订阅链接为 Clash 配置</p>

        <form id="convertForm">
            <label>订阅链接</label>
            <input type="url" id="subUrl" placeholder="https://..." required>

            <label>选择模板</label>
            <select id="template">
                <option value="override-rules-optimized.yaml">override-rules-optimized.yaml - 优化版</option>
                <option value="override-rules-smart.yaml">override-rules-smart.yaml - 智能版</option>
                <option value="clash-meta-android-template.yaml">clash-meta-android-template.yaml - 安卓版</option>
                <option value="clash-meta-template.yaml">clash-meta-template.yaml - 标准版</option>
            </select>

            <button type="submit">开始转换</button>
        </form>

        <div class="download-section">
            <h3>📥 下载桌面工具</h3>
            <p style="color: #666; font-size: 14px; margin: 10px 0;">支持离线使用，功能更强大</p>
            <a href="https://github.com/Acefa/Clash-override-rules/releases/latest" target="_blank">
                <button class="download-btn">下载 Windows 版本</button>
            </a>
        </div>

        <div class="github-link">
            <a href="https://github.com/Acefa/Clash-override-rules" target="_blank">⭐ GitHub 仓库</a>
        </div>
    </div>

    <script>
        const REPO = 'https://raw.githubusercontent.com/Acefa/Clash-override-rules/main/';

        document.getElementById('convertForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const subUrl = document.getElementById('subUrl').value;
            const template = document.getElementById('template').value;

            btn.textContent = '转换中...';
            btn.disabled = true;

            try {
                const templateUrl = REPO + template;
                const response = await fetch(`https://api.dler.io/sub?target=clash&url=${encodeURIComponent(subUrl)}&config=${encodeURIComponent(templateUrl)}`);

                if (!response.ok) throw new Error('转换失败');

                const config = await response.text();
                const blob = new Blob([config], { type: 'text/yaml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'clash-config.yaml';
                a.click();

                alert('✅ 转换成功！配置已下载');
            } catch (err) {
                alert('❌ 转换失败：' + err.message + '\n\n建议下载桌面工具使用');
            } finally {
                btn.textContent = '开始转换';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
